<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Solnut NEET CBT Platform - Practice NEET with AI-powered analysis"
    />
    <title>Solnut - Premium NEET Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              primary: '#10B981',    /* Emerald Green */
              secondary: '#3B82F6',  /* Blue */
              accent: '#8B5CF6',     /* Purple */
              warning: '#F97316',    /* Orange */
              danger: '#EF4444',     /* Red */
              sidebar: '#0F172A',    /* Dark */
              background: '#F8FAFC', /* Slate background */
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
              'float': '0 20px 40px -10px rgba(0,0,0,0.12)',
              'glow': '0 0 20px rgba(16, 185, 129, 0.4)',
            },
            borderRadius: {
              '2xl': '1rem',
              '3xl': '1.5rem', /* 24px for cards */
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
